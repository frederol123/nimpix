# ============================================================
# Continue Config для Nimpix (Laravel 13 + Tailwind 4 + Vite 8)
# ============================================================
name: "Nimpix (Laravel)"
version: 1.0.0

# ------------------------------------------------------------
# Модели для чата и редактирования кода
# ------------------------------------------------------------
models:
  - name: DeepSeek-V4-Pro
    provider: deepseek
    model: deepseek-v4-pro
    apiKey: "sk-636b4c8c13d64124b194415e8193aeef"          # <-- замени на свой ключ
    roles:
      - chat       # общение в чате
      - edit       # редактирование выделенного кода
      - apply      # применение диффов

# ------------------------------------------------------------
# Модель для автодополнения (как Copilot)
# ------------------------------------------------------------
tabAutocompleteModel:
  name: DeepSeek-Autocomplete
  provider: deepseek
  model: deepseek-v4-flash                  # быстрый и дешёвый для подсказок
  apiKey: "sk-636b4c8c13d64124b194415e8193aeef"             # <-- замени на свой ключ

# ------------------------------------------------------------
# Документация для контекста
# ------------------------------------------------------------
context:
  - provider: docs
    title: "Laravel 13"
    url: "https://laravel.com/docs/13.x"

  - provider: docs
    title: "Tailwind CSS 4"
    url: "https://tailwindcss.com/docs"

  - provider: docs
    title: "Vite"
    url: "https://vite.dev/guide"

  - provider: docs
    title: "Laravel Sanctum"
    url: "https://laravel.com/docs/13.x/sanctum"

# ------------------------------------------------------------
# Правила для AI
# ------------------------------------------------------------
rules:
  - "Ты работаешь над проектом Nimpix — приложением на Laravel 13 с PHP 8.3"
  - "Все ответы на русском языке, код комментируй на русском"
  - "Используй строгую типизацию PHP: declare(strict_types=1)"
  - "Предпочитай Eloquent ORM вместо Query Builder"
  - "Для фронтенда используй Tailwind CSS 4 utility-классы"
  - "Vite 8 настроен через laravel-vite-plugin, ресурсы лежат в resources/css и resources/js"
  - "Для ваsлидации используй Laravel Form Requests"
  - "Пиши тесты на PHPUnit 12, тесты лежат в tests/"
  - "Фронтенд будем собирать в виде Vue.js SPA приложения"
